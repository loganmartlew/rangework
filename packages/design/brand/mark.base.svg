<!--
  Rangework brand mark — canonical geometry source.

  This is the ONE hand-edited geometry source for every generated brand variant
  (web SVG, Android vector, raster). Edit geometry here only.

  - viewBox 0 0 108 108, single group translated down 4 units.
  - data-role marks each path: `band` (×3 perspective bands) or `rod` (×2, the
    tee-shaped shaft + cap).
  - fill-opacity is intrinsic design/geometry (identical across every variant),
    so it lives here. Colour does NOT — generators resolve it from design tokens.
  - No fill colours: paths carry no `fill`; generators supply it per variant.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="108" height="108" viewBox="0 0 108 108">
