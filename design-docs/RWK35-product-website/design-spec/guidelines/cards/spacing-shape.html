<!-- @dsCard group="Spacing" viewport="700x170" name="Corner radius & elevation" subtitle="Rounded M3 shapes; soft warm-graphite shadows" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--background); display: flex; gap: 28px; align-items: center; }
  .group { display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 60px; height: 56px; background: var(--surface); border: 1px solid var(--outline-variant); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--on-surface-variant); }
  .el { width: 80px; height: 56px; background: #fff; border-radius: var(--radius-md); }
  .divider { width: 1px; height: 70px; background: var(--outline-variant); }
</style>
</head>
<body>
  <div class="group">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lab">8 sm</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lab">12 md</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lab">16 lg</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lab">28 xl</div></div>
  </div>
  <div class="divider"></div>
  <div class="group">
    <div class="item"><div class="el" style="box-shadow:var(--elevation-1)"></div><div class="lab">elev 1</div></div>
    <div class="item"><div class="el" style="box-shadow:var(--elevation-2)"></div><div class="lab">elev 2</div></div>
    <div class="item"><div class="el" style="box-shadow:var(--elevation-3)"></div><div class="lab">elev 3</div></div>
  </div>
</body>
</html>
