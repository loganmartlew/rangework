<!-- @dsCard group="Type" viewport="700x200" name="Display & Headline — DM Sans" subtitle="Light (300) display, regular (400) headlines" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--background); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--on-surface-variant); width: 130px; flex: none; }
  .spec { color: var(--on-background); }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="tag">display-small 36</span><span class="spec rw-display-small">Practice with purpose</span></div>
    <div class="line"><span class="tag">headline-medium 28</span><span class="spec rw-headline-medium">Iron shot fundamentals</span></div>
    <div class="line"><span class="tag">headline-small 24</span><span class="spec rw-headline-small">Build a session plan</span></div>
  </div>
</body>
</html>
