<!-- @dsCard group="Colors" viewport="700x170" name="Surfaces — Warm Graphite" subtitle="Off-white, never pure white; warm grey container stops" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--outline-variant); }
  .chip { height: 56px; }
  .meta { padding: 7px 9px; background: #fff; }
  .name { font-size: 11px; font-weight: 500; color: var(--on-surface); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--on-surface-variant); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--background)"></div><div class="meta"><div class="name">background</div><div class="hex">#FAFAF8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface)"></div><div class="meta"><div class="name">surface</div><div class="hex">#F5F3EF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-c)"></div><div class="meta"><div class="name">container</div><div class="hex">#EFEDEA</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-c-highest)"></div><div class="meta"><div class="name">container-hi</div><div class="hex">#E4E2DE</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-dim)"></div><div class="meta"><div class="name">dim</div><div class="hex">#D5D3CF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--on-surface)"></div><div class="meta"><div class="name">on-surface</div><div class="hex">#282624</div></div></div>
  </div>
</body>
</html>
