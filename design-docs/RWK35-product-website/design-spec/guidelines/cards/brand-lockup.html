<!-- @dsCard group="Brand" viewport="700x150" name="Logo lockup" subtitle="Mark + wordmark; lowercase, medium weight" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--background); display: flex; align-items: center; gap: 40px; }
  .lockup { display: flex; align-items: center; gap: 14px; }
  .lockup img { width: 44px; height: 44px; }
  .word { font-family: var(--font-sans); font-weight: 500; font-size: 30px; letter-spacing: -0.5px; color: var(--on-background); }
  .word b { color: var(--primary); font-weight: 500; }
  .dark { background: var(--neutral-90); padding: 16px 22px; border-radius: var(--radius-md); }
  .dark .word { color: var(--neutral-20); }
  .dark .word b { color: var(--primary-30); }
</style>
</head>
<body>
  <div class="lockup">
    <img src="../../assets/rangework-mark.svg" alt="">
    <span class="word"><b>range</b>work</span>
  </div>
  <div class="lockup dark">
    <img src="../../assets/rangework-mark-mono.svg" alt="" style="color:#D5D3CF">
    <span class="word"><b>range</b>work</span>
  </div>
</body>
</html>
