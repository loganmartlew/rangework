<!-- @dsCard group="Colors" viewport="700x150" name="Semantic roles & containers" subtitle="Primary / secondary / error tonal pairs with on-colors" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; }
  .row { display: flex; gap: 10px; }
  .pair { flex: 1; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--outline-variant); }
  .top { height: 44px; display: flex; align-items: center; padding: 0 12px; font-size: 13px; font-weight: 500; }
  .bot { height: 30px; display: flex; align-items: center; padding: 0 12px; font-size: 11px; }
</style>
</head>
<body>
  <div class="row">
    <div class="pair">
      <div class="top" style="background:var(--primary);color:var(--on-primary)">Primary</div>
      <div class="bot" style="background:var(--primary-container);color:var(--on-primary-container)">container</div>
    </div>
    <div class="pair">
      <div class="top" style="background:var(--secondary);color:var(--on-secondary)">Secondary</div>
      <div class="bot" style="background:var(--secondary-container);color:var(--on-secondary-container)">container</div>
    </div>
    <div class="pair">
      <div class="top" style="background:var(--tertiary);color:#fff">Tertiary</div>
      <div class="bot" style="background:var(--tertiary-container);color:var(--tertiary-90)">container</div>
    </div>
    <div class="pair">
      <div class="top" style="background:var(--error);color:var(--on-error)">Error</div>
      <div class="bot" style="background:var(--error-container);color:var(--on-error-container)">container</div>
    </div>
  </div>
</body>
</html>
