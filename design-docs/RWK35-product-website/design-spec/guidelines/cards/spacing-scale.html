<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale — 4px grid" subtitle="16px is the default screen & card padding" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--background); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .bar { background: var(--primary); border-radius: 2px; height: 48px; }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--on-surface-variant); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px"></div><div class="lab">4</div></div>
    <div class="item"><div class="bar" style="width:8px"></div><div class="lab">8</div></div>
    <div class="item"><div class="bar" style="width:12px"></div><div class="lab">12</div></div>
    <div class="item"><div class="bar" style="width:16px"></div><div class="lab">16</div></div>
    <div class="item"><div class="bar" style="width:24px"></div><div class="lab">24</div></div>
    <div class="item"><div class="bar" style="width:32px"></div><div class="lab">32</div></div>
    <div class="item"><div class="bar" style="width:48px"></div><div class="lab">48</div></div>
  </div>
</body>
</html>
