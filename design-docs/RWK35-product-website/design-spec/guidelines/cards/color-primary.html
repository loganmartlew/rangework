<!-- @dsCard group="Colors" viewport="700x150" name="Primary — Deep Fairway" subtitle="Core brand green; primary actions, FABs, selection" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--outline-variant); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--surface); }
  .name { font-size: 12px; font-weight: 500; color: var(--on-surface); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--on-surface-variant); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--primary-30)"></div><div class="meta"><div class="name">30</div><div class="hex">#8FC8A8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--primary-40)"></div><div class="meta"><div class="name">40</div><div class="hex">#60A882</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--primary-50)"></div><div class="meta"><div class="name">50 · base</div><div class="hex">#2D6A4F</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--primary-60)"></div><div class="meta"><div class="name">60</div><div class="hex">#235438</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--primary-70)"></div><div class="meta"><div class="name">70</div><div class="hex">#1A3D28</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--primary-90)"></div><div class="meta"><div class="name">90</div><div class="hex">#09160D</div></div></div>
  </div>
</body>
</html>
