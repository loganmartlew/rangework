<!-- @dsCard group="Colors" viewport="700x150" name="Secondary — Lighter Sage" subtitle="Calmer support green; mono metrics, secondary accents" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--outline-variant); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--surface); }
  .name { font-size: 12px; font-weight: 500; color: var(--on-surface); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--on-surface-variant); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--secondary-30)"></div><div class="meta"><div class="name">30</div><div class="hex">#8ABFB6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--secondary-40)"></div><div class="meta"><div class="name">40</div><div class="hex">#6AA89E</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--secondary-50)"></div><div class="meta"><div class="name">50 · base</div><div class="hex">#52796F</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--secondary-60)"></div><div class="meta"><div class="name">60</div><div class="hex">#3F6058</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--secondary-70)"></div><div class="meta"><div class="name">70</div><div class="hex">#2E4740</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-rod)"></div><div class="meta"><div class="name">rod</div><div class="hex">#386044</div></div></div>
  </div>
</body>
</html>
