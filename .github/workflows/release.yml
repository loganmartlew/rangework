name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (semver, e.g. 1.0.0)'
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$VERSION' does not match MAJOR.MINOR.PATCH format"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Derive versionCode
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists"
            exit 1
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x apps/mobile/gradlew

      - name: Decode keystore
        env:
          RANGEWORK_RELEASE_KEYSTORE_BASE64: ${{ secrets.RANGEWORK_RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RANGEWORK_RELEASE_KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore

      - name: Build signed AAB
        working-directory: apps/mobile
        env:
          RANGEWORK_VERSION_NAME: ${{ env.VERSION }}
          RANGEWORK_VERSION_CODE: ${{ env.VERSION_CODE }}
          RANGEWORK_RELEASE_KEYSTORE_PATH: /tmp/release.keystore
          RANGEWORK_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RANGEWORK_RELEASE_KEYSTORE_PASSWORD }}
          RANGEWORK_RELEASE_KEY_ALIAS: ${{ secrets.RANGEWORK_RELEASE_KEY_ALIAS }}
          RANGEWORK_RELEASE_KEY_PASSWORD: ${{ secrets.RANGEWORK_RELEASE_KEY_PASSWORD }}
          RANGEWORK_SUPABASE_URL: ${{ secrets.RANGEWORK_SUPABASE_URL }}
          RANGEWORK_SUPABASE_ANON_KEY: ${{ secrets.RANGEWORK_SUPABASE_ANON_KEY }}
          RANGEWORK_GOOGLE_WEB_CLIENT_ID: ${{ secrets.RANGEWORK_GOOGLE_WEB_CLIENT_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew :androidApp:bundleRelease

      - name: Build signed APK
        working-directory: apps/mobile
        env:
          RANGEWORK_VERSION_NAME: ${{ env.VERSION }}
          RANGEWORK_VERSION_CODE: ${{ env.VERSION_CODE }}
          RANGEWORK_RELEASE_KEYSTORE_PATH: /tmp/release.keystore
          RANGEWORK_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RANGEWORK_RELEASE_KEYSTORE_PASSWORD }}
          RANGEWORK_RELEASE_KEY_ALIAS: ${{ secrets.RANGEWORK_RELEASE_KEY_ALIAS }}
          RANGEWORK_RELEASE_KEY_PASSWORD: ${{ secrets.RANGEWORK_RELEASE_KEY_PASSWORD }}
          RANGEWORK_SUPABASE_URL: ${{ secrets.RANGEWORK_SUPABASE_URL }}
          RANGEWORK_SUPABASE_ANON_KEY: ${{ secrets.RANGEWORK_SUPABASE_ANON_KEY }}
          RANGEWORK_GOOGLE_WEB_CLIENT_ID: ${{ secrets.RANGEWORK_GOOGLE_WEB_CLIENT_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew :androidApp:assembleRelease

      - name: Clean up keystore
        if: always()
        run: rm -f /tmp/release.keystore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          generate_release_notes: true
          files: |
            apps/mobile/androidApp/build/outputs/bundle/release/androidApp-release.aab
            apps/mobile/androidApp/build/outputs/apk/release/androidApp-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
