name: MCP Deploy

on:
  workflow_dispatch:

concurrency:
  group: mcp-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @rangework/mcp typecheck

      - name: Lint
        run: pnpm --filter @rangework/mcp lint

      - name: Test
        run: pnpm --filter @rangework/mcp test

      - name: Upload methodology to R2
        run: pnpm --filter @rangework/mcp exec wrangler r2 object put rangework/mcp/coaching-guide.md --file methodology/coaching-guide.md --content-type text/markdown --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/mcp
          command: deploy
